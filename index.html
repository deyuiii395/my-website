    <script type="text/babel">

        const Icons = {

            ChevronLeft: (p) => <svg {...p} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>,
            Check: (p) => <svg {...p} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,

            FileText: (p) => <svg {...p} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>,
            Search: (p) => <svg {...p} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,

            Activity: (p) => <svg {...p} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>,
            BookOpen: (p) => <svg {...p} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>,
        };

        // --- Configuration ---
        const EXAM_CONFIG = [
            { id: 0, name: "① 8月联考", defaultSpecial: 413, defaultBachelor: 371, defaultSubs: { 语文:82, 数学:82, 英语:82, 物理:55, 化学:55, 生物:55, 政治:55, 历史:55, 地理:55 } },
            { id: 1, name: "② 9月联考", defaultSpecial: 454, defaultBachelor: 375.5, defaultSubs: { 语文:90, 数学:90, 英语:90, 物理:60, 化学:60, 生物:60, 政治:60, 历史:60, 地理:60 } },
            { id: 2, name: "③ 10月联考", defaultSpecial: 421, defaultBachelor: 373, defaultSubs: { 语文:84, 数学:84, 英语:84, 物理:56, 化学:56, 生物:56, 政治:56, 历史:56, 地理:56 } },
            { id: 3, name: "④ 12月(1)联考", defaultSpecial: 424, defaultBachelor: 352, defaultSubs: { 语文:85, 数学:85, 英语:85, 物理:57, 化学:57, 生物:57, 政治:57, 历史:57, 地理:57 } },
            { id: 4, name: "⑤ 12月(2)联考", defaultSpecial: 412, defaultBachelor: 365, defaultSubs: { 语文:82, 数学:82, 英语:82, 物理:55, 化学:55, 生物:55, 政治:55, 历史:55, 地理:55 } },
            { id: 5, name: "⑥ 1月一模", defaultSpecial: 446, defaultBachelor: 385, defaultSubs: { 语文:89, 数学:89, 英语:89, 物理:59, 化学:59, 生物:59, 政治:59, 历史:59, 地理:59 } },
        ];
        // 运行时考试配置：默认使用 EXAM_CONFIG，加载后端 exams 后会覆盖（Data-Driven，支持 n 次考试）
        let RUNTIME_EXAMS = EXAM_CONFIG;
        const getLastExamIndex = () => Math.max(0, (RUNTIME_EXAMS && RUNTIME_EXAMS.length) ? RUNTIME_EXAMS.length - 1 : 5);
        const SUBJECTS = ['语文', '数学', '英语', '物理', '化学', '生物', '政治', '历史', '地理'];
        const COLORS = ["#ef4444", "#f97316", "#f59e0b", "#10b981", "#06b6d4", "#3b82f6", "#6366f1", "#8b5cf6", "#d946ef"];
        
        // Demo data
        const DEMO_STUDENTS = [{
            name: "李欣", id: "230493",
            scores: [
                { examId: 0, total: 442.5, rank: 1, gradeRank: 69, subjects: { 语文: 109, 数学: 58, 英语: 83.5, 物理: 26, 化学: 75, 地理: 91 } }, 
                { examId: 1, total: 434.5, rank: 1, gradeRank: 237, subjects: { 语文: 91.5, 数学: 54, 英语: 96, 物理: 30, 化学: 71, 地理: 92 } }, 
                { examId: 2, total: 392.5, rank: 3, gradeRank: 316, subjects: { 语文: 94.5, 数学: 50, 英语: 90, 物理: 20, 化学: 60, 地理: 78 } }, 
                { examId: 3, total: 414, rank: 3, gradeRank: 172, subjects: { 语文: 91.5, 数学: 60, 英语: 95, 物理: 35, 化学: 65, 地理: 67.5 } }, 
                { examId: 4, total: 400, rank: 4, gradeRank: 200, subjects: { 语文: 90, 数学: 55, 英语: 92, 物理: 28, 化学: 70, 地理: 65 } }, 
                { examId: 5, total: 477.5, rank: 1, gradeRank: 101, subjects: { 语文: 103, 数学: 66, 英语: 102.5, 物理: 43, 化学: 73, 地理: 90 } }
            ] 
        }];

        // --- Logic: 智能诊断（归因=班均/标准差对比；科目建议=分科分基础）---
        const SUBJECT_ADVICE_MAP = {
            语文: { weak: "加强阅读与古诗文积累，作文注重审题与结构；建议建立素材本与错题归纳。", normal: "保持阅读量，强化古诗文与论述类文本；作文可针对性练审题与立意。", strong: "保持现有优势，可冲刺高分作文与阅读满分；注意卷面与时间分配。" },
            数学: { weak: "强化计算准确率与审题习惯，先抓中档题；建议每日限时练基础题与错题重做。", normal: "巩固中档题，突破选填压轴；注意步骤规范与时间分配。", strong: "可攻关压轴题与创新题；保持手感，注意考场心态与时间分配。" },
            英语: { weak: "夯实词汇与长难句，听力与写作分项突破；建议每日阅读与听力输入。", normal: "强化阅读速度与完形逻辑；作文可积累句式与范文。", strong: "保持阅读与听力输入；作文可追求亮点表达与卷面。" },
            物理: { weak: "从受力与运动分析入手，吃透基本模型与公式；建议画图分析、规范列式。", normal: "巩固典型模型与实验题；加强综合题拆解与计算。", strong: "可突破综合题与创新情境；注意实验题表述与单位规范。" },
            化学: { weak: "抓牢方程式与基本概念，重视课本实验与流程；建议分专题突破有机与计算。", normal: "巩固工业流程与实验探究；强化有机推断与计算题。", strong: "可冲刺工业流程与有机综合；注意表述规范与陷阱识别。" },
            生物: { weak: "强化概念辨析与教材表述，遗传与实验设计分步练；建议构建知识网络。", normal: "巩固遗传与调节、生态；加强长空与实验设计题。", strong: "可突破开放性题与长空；注意术语准确与逻辑链完整。" },
            政治: { weak: "回归教材主干与术语，材料题学会抓关键词与多角度；建议建立时政与术语本。", normal: "巩固模块联系与热点；强化材料题审题与书写规范。", strong: "可结合时政拓展深度；注意逻辑层次与卷面。" },
            历史: { weak: "夯实时空与阶段特征，材料题练审题与史论结合；建议梳理通史与专题。", normal: "巩固史料解读与小论文；加强选择题易错点归纳。", strong: "可深化史料题与小论文；注意表述严谨与时间分配。" },
            地理: { weak: "强化读图与区域认知，自然与人文原理回归教材；建议建立区域与模板。", normal: "巩固综合题与图表题；加强因果链与术语表述。", strong: "可突破综合题与开放题；注意图表信息提取完整。" },
        };
        const median = (arr) => {
            if (!arr || arr.length === 0) return 0;
            const sorted = [...arr].sort((a, b) => a - b);
            const mid = Math.floor(sorted.length / 2);
            return sorted.length % 2 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2;
        };
        const mad = (arr, med) => median((arr || []).map(v => Math.abs(v - med)));
        const avg = (arr) => arr && arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : 0;
        const std = (arr, mean) => {
            if (!arr || arr.length === 0) return 0;
            const base = mean != null ? mean : avg(arr);
            return Math.sqrt(arr.reduce((sum, v) => sum + Math.pow(v - base, 2), 0) / arr.length);
        };
        const formatSigned = (n) => (n >= 0 ? `+${n.toFixed(1)}` : `${n.toFixed(1)}`);
        const percentileRank = (arr, val) => {
            if (!arr || arr.length === 0) return 0;
            const lessOrEq = arr.filter(v => v <= val).length;
            return Math.round((lessOrEq / arr.length) * 100);
        };

        const generateDetailedAnalysis = (student, cutoffs, allStudents) => {
            if (!student || student.scores.every(s => s.total === 0)) {
                return {
                    portrait: "数据不足",
                    trend: "数据不足",
                    trendRaw: "",
                    outlierNotes: [],
                    anomalyNotes: [],
                    subjectRows: [],
                    subjectAdviceList: [],
                    actionPlan: [{ title: "补齐数据", detail: "至少补全近 6 次考试后再生成稳定诊断。", ratio: 100 }]
                };
            }

            const validScoreEntries = student.scores
                .map((s, i) => ({ ...s, examIdx: i }))
                .filter(s => s.total > 0);
            const latest = validScoreEntries[validScoreEntries.length - 1];
            const latestIdx = latest.examIdx;
            const prev = validScoreEntries.length > 1 ? validScoreEntries[validScoreEntries.length - 2] : null;
            const currentCutoff = cutoffs[latestIdx] || { special: 0, bachelor: 0 };
            const totalSeries = validScoreEntries.map(s => s.total);

            const classTotalsLatest = allStudents.map(s => s.scores[latestIdx]?.total || 0).filter(v => v > 0);
            const classAvgTotal = avg(classTotalsLatest);
            const gapSpecial = latest.total - (currentCutoff.special || 0);
            const gapBachelor = latest.total - (currentCutoff.bachelor || 0);
            const totalMedian = median(totalSeries);
            const totalMax = Math.max(...totalSeries);
            const totalMin = Math.min(...totalSeries);
            const totalPercentile = percentileRank(totalSeries, latest.total);
            const highLowTag = latest.total === totalMax ? "（创个人新高）" : (latest.total === totalMin ? "（创个人新低）" : "");

            const contribution = prev ? SUBJECTS.map(sub => {
                const curr = latest.subjects[sub] || 0;
                const old = prev.subjects[sub] || 0;
                return { sub, diff: curr - old };
            }).sort((a, b) => Math.abs(b.diff) - Math.abs(a.diff)).slice(0, 2) : [];
            const contributionText = contribution.length
                ? contribution.map(c => `${c.sub}${formatSigned(c.diff)}分`).join("，")
                : "暂无可对比的上次数据";

            const portrait = `本次总分 ${latest.total.toFixed(1)}；较本科线${formatSigned(gapBachelor)} 分，较特控线${formatSigned(gapSpecial)} 分；较班均${formatSigned(latest.total - classAvgTotal)} 分。个人历史最高 ${totalMax.toFixed(1)}、最低 ${totalMin.toFixed(1)}、中位数 ${totalMedian.toFixed(1)}，本次位于个人历史 P${totalPercentile}${highLowTag}。较上次总分${prev ? formatSigned(latest.total - prev.total) : "暂无对比"}，主要由 ${contributionText} 贡献。`;

            const recent3 = totalSeries.slice(-3);
            const prev3 = totalSeries.slice(-6, -3);
            const delta = (recent3.length === 3 && prev3.length === 3) ? (avg(recent3) - avg(prev3)) : 0;
            const trendTag = delta >= 15 ? "上升" : (delta <= -15 ? "下滑" : "平稳");
            const trend = (recent3.length === 3 && prev3.length === 3)
                ? `按“最近3次均值 - 前3次均值”计算，Δ=${delta.toFixed(1)}，趋势判定为【${trendTag}】。`
                : "有效总分不足 6 次，暂不做 3+3 稳健趋势判定。";
            const trendRaw = (recent3.length === 3 && prev3.length === 3)
                ? `前3次：${prev3.map(v => v.toFixed(1)).join(" / ")}；最近3次：${recent3.map(v => v.toFixed(1)).join(" / ")}。`
                : "";

            const outlierNotes = [];
            const totalMed = median(totalSeries);
            validScoreEntries.forEach(s => {
                const diff = s.total - totalMed;
                if (Math.abs(diff) >= 40) {
                    const examName = RUNTIME_EXAMS[s.examIdx]?.name || `第${s.examIdx + 1}次`;
                    outlierNotes.push(`${examName} 总分 ${s.total.toFixed(1)}，相对个人中位数 ${totalMed.toFixed(1)} 偏离 ${formatSigned(diff)} 分（${diff > 0 ? "正向离群值" : "负向离群值"}）。`);
                }
            });

            const anomalyNotes = [];
            SUBJECTS.forEach(sub => {
                const vals = student.scores.map(s => s.subjects[sub]).filter(v => v != null && v > 0);
                if (vals.length < 5) return;
                const med = median(vals);
                const madVal = mad(vals, med);
                const threshold = Math.max(15, 2.5 * madVal);
                student.scores.forEach((s, idx) => {
                    const x = s.subjects[sub];
                    if (!x || x <= 0) return;
                    const d = x - med;
                    if (Math.abs(d) >= threshold) {
                        const examName = RUNTIME_EXAMS[idx]?.name || `第${idx + 1}次`;
                        anomalyNotes.push(`${examName} ${sub} 出现异常波动（偏离个人中位数 ${formatSigned(d)} 分），建议排查原因。`);
                    }
                });
            });

            const subjectRows = SUBJECTS.map(sub => {
                const latestVal = latest.subjects[sub] || 0;
                const hist = student.scores.map(s => s.subjects[sub]).filter(v => v != null && v > 0);
                if (hist.length === 0) return null;
                const med = median(hist);
                const madVal = mad(hist, med);
                const min = Math.min(...hist);
                const max = Math.max(...hist);
                const classVals = allStudents.map(s => s.scores[latestIdx]?.subjects[sub]).filter(v => v != null && v > 0);
                const classMean = avg(classVals);
                const classGap = latestVal - classMean;
                const subjectThreshold = Math.max(15, 2.5 * madVal);
                const personalOutlier = Math.abs(latestVal - med) >= subjectThreshold;
                const longTermWeak = med < classMean - 3;

                let judgement = "状态基本正常，保持节奏";
                if (!personalOutlier && longTermWeak) judgement = "个人常态，班级层面偏弱";
                if (personalOutlier && longTermWeak && latestVal < med) judgement = "本次+长期双重薄弱，优先级高";
                if (personalOutlier && !longTermWeak && latestVal < med) judgement = "本次略失常，非长期问题";
                if (!personalOutlier && latestVal >= med && longTermWeak) judgement = "本次发挥好，但绝对分仍低";

                return {
                    subject: sub,
                    latest: latestVal,
                    histMedian: med,
                    histMin: min,
                    histMax: max,
                    classMean,
                    classGap,
                    personalOutlier,
                    longTermWeak,
                    judgement,
                    historyText: `${latestVal >= med ? "偏上" : "偏下"}（中位 ${med.toFixed(1)}，极差 ${min.toFixed(1)}-${max.toFixed(1)}）`,
                    classText: `${classGap >= 0 ? "高于" : "低于"}班均 ${Math.abs(classGap).toFixed(1)} 分`,
                    historySeries: hist
                };
            }).filter(Boolean);

            const subjectAdviceList = subjectRows.map(row => {
                const values = row.historySeries;
                const m = avg(values);
                const s = std(values, m);
                const cv = m > 0 ? s / m : 0;
                const madVal = mad(values, row.histMedian);
                const stable = cv <= 0.12 && madVal <= 6;
                const highMean = row.histMedian >= row.classMean;
                const latestDev = row.latest - row.histMedian;
                const outlierNow = Math.abs(latestDev) >= Math.max(15, 2.5 * madVal);
                const seqText = values.map(v => v.toFixed(1)).join(" / ");
                let branch = "C";
                let suggestion = "";

                if (outlierNow && latestDev < 0 && !row.longTermWeak) {
                    branch = "E";
                    suggestion = `${row.subject}本次较中位数 ${row.histMedian.toFixed(1)} 下滑 ${Math.abs(latestDev).toFixed(1)} 分，但历史序列 ${seqText} 显示长期不弱。建议优先做本次试卷“错因复盘清单”：按审题/计算/时间分配分类，3天内完成二次订正，无需立即开启大规模专项训练。`;
                } else if (outlierNow && latestDev > 0 && row.longTermWeak) {
                    branch = "F";
                    suggestion = `${row.subject}本次高于个人中位数 ${latestDev.toFixed(1)} 分，但9次序列 ${seqText} 的长期中位仅 ${row.histMedian.toFixed(1)}。建议把这次高分拆成可复制动作（题型顺序、时间分配、压轴取舍），连续3次按同策略执行，避免“一次超常后松劲”。`;
                } else if (highMean && stable) {
                    branch = "A";
                    suggestion = `${row.subject}9次成绩 ${seqText}，中位 ${row.histMedian.toFixed(1)}，波动可控（CV ${(cv * 100).toFixed(1)}%）。当前是优势稳定科，建议每周保留2次限时套题，重点冲刺高区间失分点，作为总分提档亮点。`;
                } else if (highMean && !stable) {
                    branch = "B";
                    suggestion = `${row.subject}9次成绩 ${seqText}，中位 ${row.histMedian.toFixed(1)}，但波动偏大（CV ${(cv * 100).toFixed(1)}%，MAD ${madVal.toFixed(1)}）。这是“稳定性问题”而非“水平问题”，建议优先对低分场次做同题型重练+考场流程复盘，先稳住下限。`;
                } else if (!highMean && stable) {
                    branch = "C";
                    suggestion = `${row.subject}9次成绩 ${seqText}，中位 ${row.histMedian.toFixed(1)} 且波动相对稳定。建议执行“基础提分配额”：每周学习时间中固定投入约35%，围绕高频基础题和必得分模块连续4周滚动提升。`;
                } else {
                    branch = "D";
                    suggestion = `${row.subject}9次成绩 ${seqText}，中位 ${row.histMedian.toFixed(1)}，波动较大（CV ${(cv * 100).toFixed(1)}%）。建议先定位失分类型占比（知识盲点/计算失误/时间不足），按占比最高项先治理，再做针对性训练，避免盲目刷题。`;
                }

                const priorityScore = Math.max(0, row.classMean - row.latest) + (row.personalOutlier ? 6 : 0) + (row.longTermWeak ? 8 : 0);
                return {
                    subject: row.subject,
                    branch,
                    priorityScore,
                    suggestion,
                    dataLine: `本次 ${row.latest.toFixed(1)}，中位 ${row.histMedian.toFixed(1)}，范围 ${row.histMin.toFixed(1)}-${row.histMax.toFixed(1)}。`
                };
            }).sort((a, b) => b.priorityScore - a.priorityScore);

            const topActions = subjectAdviceList.slice(0, 3);
            const totalWeight = topActions.reduce((sum, x) => sum + (x.priorityScore || 1), 0) || 1;
            const actionPlan = topActions.map((item, i) => {
                const ratio = i === topActions.length - 1
                    ? 100 - topActions.slice(0, i).reduce((sum, x) => sum + Math.round(((x.priorityScore || 1) / totalWeight) * 100), 0)
                    : Math.round(((item.priorityScore || 1) / totalWeight) * 100);
                const actionText = item.branch === "B"
                    ? "稳定性训练优先：精做+复盘，不做无目的刷量。"
                    : (item.branch === "E"
                        ? "聚焦本次错题订正，短周期闭环验证。"
                        : (item.branch === "C" || item.branch === "D"
                            ? "基础模块拆分推进，按周验收。"
                            : "维持优势并冲刺高价值题型。"));
                return { title: `${item.subject} 优先级 ${i + 1}`, detail: actionText, ratio: Math.max(10, ratio) };
            });

            return { portrait, trend, trendRaw, outlierNotes, anomalyNotes, subjectRows, subjectAdviceList, actionPlan };
        };

        // --- Subject Analysis Component ---
        const SubjectAnalysis = ({ allStudents, cutoffs }) => {
            const [selectedSub, setSelectedSub] = useState('语文');
            const [selectedExamId, setSelectedExamId] = useState(() => getLastExamIndex());
            useEffect(() => { setSelectedExamId(getLastExamIndex()); }, [cutoffs.length]);
            
            const analysisData = useMemo(() => {
                const students = allStudents.filter(s => s.scores[selectedExamId]?.subjects[selectedSub] > 0);
                if (students.length === 0) return null;
                
                const scores = students.map(s => s.scores[selectedExamId].subjects[selectedSub]);
                const max = Math.max(...scores);
                const avg = (scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1);
                
                // Get cutoff for this subject (use default if not custom set)
                const subLine = cutoffs[selectedExamId].subjects
                    ? cutoffs[selectedExamId].subjects[selectedSub]
                    : (RUNTIME_EXAMS[selectedExamId]?.defaultSubs?.[selectedSub] ?? 0);
                
                const passCount = scores.filter(s => s >= subLine).length;
                const passRate = ((passCount / scores.length) * 100).toFixed(1);
                
                // Distribution
                const fullMark = (['语文','数学','英语'].includes(selectedSub)) ? 150 : 100;
                const dist = [0,0,0,0,0]; // <60%, 60-70%, 70-80%, 80-90%, >90%
                scores.forEach(s => {
                    const ratio = s / fullMark;
                    if (ratio < 0.6) dist[0]++;
                    else if (ratio < 0.7) dist[1]++;
                    else if (ratio < 0.8) dist[2]++;
                    else if (ratio < 0.9) dist[3]++;
                    else dist[4]++;
                });
                
                // Progress Stars (Compare with prev exam if possible)
                let stars = [];
                if (selectedExamId > 0) {
                    const prevId = selectedExamId - 1;
                    const diffs = students.map(s => {
                        const curr = s.scores[selectedExamId].subjects[selectedSub] || 0;
                        const prev = s.scores[prevId].subjects[selectedSub] || 0;
                        return { name: s.name, diff: curr - prev, curr: curr };
                    }).filter(d => d.curr > 0 && d.diff > 0);
                    stars = diffs.sort((a,b) => b.diff - a.diff).slice(0, 5);
                }

                // 单科前十名单：按该科分数降序取前10
                const top10 = students
                    .map(s => ({ name: s.name, id: s.id, score: s.scores[selectedExamId].subjects[selectedSub] }))
                    .filter(d => d.score > 0)
                    .sort((a, b) => b.score - a.score)
                    .slice(0, 10);

                return { max, avg, passRate, dist, stars, subLine, top10 };
            }, [allStudents, selectedSub, selectedExamId, cutoffs]);

            if (!analysisData) return <div className="p-10 text-center text-gray-500">暂无该次考试的{selectedSub}数据</div>;

            return (
                <div className="space-y-6 animate-fade-in no-print">
                    <div className="flex flex-col md:flex-row justify-between items-center gap-4 bg-white p-4 rounded-xl card-shadow">
                        <div className="flex gap-2 overflow-x-auto w-full md:w-auto">
                            {SUBJECTS.map(sub => (
                                <button key={sub} onClick={() => setSelectedSub(sub)} 
                                    className={`px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap transition ${selectedSub === sub ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
                                    {sub}
                                </button>
                            ))}
                        </div>
                        <div className="flex gap-2">
                             {RUNTIME_EXAMS.slice().reverse().map((exam, i) => { 
                                const realIdx = RUNTIME_EXAMS.length - 1 - i; 
                                return <button key={realIdx} onClick={() => setSelectedExamId(realIdx)} className={`px-3 py-1 rounded text-xs ${selectedExamId === realIdx ? 'bg-blue-100 text-blue-700 border border-blue-300' : 'bg-white border text-gray-500'}`}>{(exam.name && (exam.name.split(' ')[1] || exam.name)) || `第${realIdx + 1}次`}</button>; 
                            })}
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <div className="bg-white p-4 rounded-xl card-shadow text-center border-l-4 border-green-500">
                            <p className="text-gray-500 text-sm">最高分</p>
                            <p className="text-3xl font-bold text-gray-800">{analysisData.max}</p>
                        </div>
                        <div className="bg-white p-4 rounded-xl card-shadow text-center border-l-4 border-blue-500">
                            <p className="text-gray-500 text-sm">平均分</p>
                            <p className="text-3xl font-bold text-gray-800">{analysisData.avg}</p>
                        </div>
                        <div className="bg-white p-4 rounded-xl card-shadow text-center border-l-4 border-purple-500">
                            <p className="text-gray-500 text-sm">及格率 (≥{analysisData.subLine})</p>
                            <p className="text-3xl font-bold text-gray-800">{analysisData.passRate}%</p>
                        </div>
                        <div className="bg-white p-4 rounded-xl card-shadow text-center border-l-4 border-orange-500">
                            <p className="text-gray-500 text-sm">优秀人数 (≥80%)</p>
                            <p className="text-3xl font-bold text-gray-800">{analysisData.dist[3] + analysisData.dist[4]}人</p>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="bg-white p-6 rounded-xl card-shadow">
                            <h3 className="font-bold text-gray-800 mb-4 flex items-center"><Icons.Trophy className="mr-2 text-amber-500"/> {selectedSub} 单科前十名单</h3>
                            {analysisData.top10.length > 0 ? (
                                <div className="overflow-x-auto">
                                    <table className="w-full text-sm">
                                        <thead>
                                            <tr className="border-b-2 border-gray-200 text-gray-600">
                                                <th className="text-left py-2 px-3">排名</th>
                                                <th className="text-left py-2 px-3">姓名</th>
                                                <th className="text-right py-2 px-3">{selectedSub}分数</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {analysisData.top10.map((row, i) => (
                                                <tr key={row.id} className="border-b border-gray-100 hover:bg-amber-50/50">
                                                    <td className="py-2.5 px-3 font-mono font-bold">{i + 1}</td>
                                                    <td className="py-2.5 px-3 font-medium text-gray-800">{row.name}</td>
                                                    <td className="py-2.5 px-3 text-right font-bold text-amber-600">{row.score}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            ) : (
                                <p className="text-gray-400 text-sm">暂无该科有效成绩</p>
                            )}
                        </div>
                        <div className="bg-white p-6 rounded-xl card-shadow">
                            <h3 className="font-bold text-gray-800 mb-4 flex items-center"><Icons.TrendingUp className="mr-2 text-red-500"/> 进步之星 (较上次)</h3>
                            {analysisData.stars.length > 0 ? (
                                <ul className="space-y-3">
                                    {analysisData.stars.map((s, i) => (
                                        <li key={i} className="flex justify-between items-center border-b pb-2 last:border-0">
                                            <span className="font-bold text-gray-700">{s.name}</span>
                                            <span className="text-sm bg-red-100 text-red-600 px-2 py-1 rounded-full font-bold">+{s.diff}分</span>
                                        </li>
                                    ))}
                                </ul>
                            ) : (
                                <p className="text-gray-400 text-sm">暂无对比数据</p>
                            )}
                        </div>
                    </div>

                    <div className="bg-white p-6 rounded-xl card-shadow">
                        <h3 className="font-bold text-gray-800 mb-4">📊 {selectedSub}成绩分布直方图</h3>
                        <div className="h-64">
                            <ResponsiveContainer width="100%" height="100%">
                                <BarChart data={[
                                    {range: '<60%', count: analysisData.dist[0]},
                                    {range: '60-70%', count: analysisData.dist[1]},
                                    {range: '70-80%', count: analysisData.dist[2]},
                                    {range: '80-90%', count: analysisData.dist[3]},
                                    {range: '>90%', count: analysisData.dist[4]},
                                ]}>
                                    <CartesianGrid strokeDasharray="3 3" vertical={false}/>
                                    <XAxis dataKey="range" fontSize={12}/>
                                    <YAxis allowDecimals={false}/>
                                    <Tooltip cursor={{fill: '#f3f4f6'}}/>
                                    <Bar dataKey="count" fill="#3b82f6" radius={[4, 4, 0, 0]} barSize={40}>
                                        <LabelList dataKey="count" position="top" />
                                    </Bar>
                                </BarChart>
                            </ResponsiveContainer>
                        </div>
                    </div>
                    
                    <div className="bg-blue-50 p-4 rounded-xl border border-blue-200">
                        <h3 className="font-bold text-blue-800 mb-2">🤖 AI 学情简报</h3>
                        <p className="text-sm text-blue-800 leading-relaxed">
                            本次{(RUNTIME_EXAMS[selectedExamId] && RUNTIME_EXAMS[selectedExamId].name) || ''}中，全班{selectedSub}学科平均分为 <span className="font-bold">{analysisData.avg}</span>。
                            从分布来看，优秀率（得分率≥80%）达到了 <span className="font-bold">{(((analysisData.dist[3] + analysisData.dist[4]) / allStudents.length) * 100).toFixed(1)}%</span>，
                            尚有 <span className="font-bold">{analysisData.dist[0]}</span> 人未及格。
                            {analysisData.dist[0] > 5 ? "建议重点关注后进生的基础巩固。" : "整体基础较为扎实，可适当增加拔高训练。"}
                        </p>
                    </div>
                </div>
            );
        };

        // --- Dashboard Components ---
        const Dashboard = ({ allStudents, cutoffs, onStudentClick }) => {
            const stats = useMemo(() => {
                return RUNTIME_EXAMS.map((cfg, idx) => {
                    const students = allStudents.filter(s => s.scores[idx] && s.scores[idx].total > 0);
                    if (students.length === 0) return { name: cfg.name, avg: 0, specialCount: 0, bachelorCount: 0, subs: {} };
                    const totalSum = students.reduce((a, b) => a + b.scores[idx].total, 0);
                    const specialList = students.filter(s => s.scores[idx].total >= cutoffs[idx].special);
                    const bachelorList = students.filter(s => s.scores[idx].total >= cutoffs[idx].bachelor);
                    let subSums = {}; let subCounts = {};
                    students.forEach(s => { Object.entries(s.scores[idx].subjects).forEach(([sub, score]) => { if(score > 0) { subSums[sub] = (subSums[sub] || 0) + score; subCounts[sub] = (subCounts[sub] || 0) + 1; } }); });
                    let subAvgs = {}; SUBJECTS.forEach(sub => { subAvgs[sub] = subCounts[sub] ? parseFloat((subSums[sub] / subCounts[sub]).toFixed(1)) : 0; });
                    return { name: (cfg.name && cfg.name.split(' ')[1]) || cfg.name || `第${idx + 1}次`, avg: parseFloat((totalSum / students.length).toFixed(1)), specialCount: specialList.length, bachelorCount: bachelorList.length, specialList: specialList.sort((a,b) => b.scores[idx].total - a.scores[idx].total), ...subAvgs };
                });
            }, [allStudents, cutoffs]);
            const latestStat = stats[stats.length - 1];
            const lastIdx = getLastExamIndex();
            const prevIdx = Math.max(0, lastIdx - 1);
            const bachelorList = allStudents.filter(s => s.scores[lastIdx]?.total >= cutoffs[lastIdx]?.bachelor).sort((a,b) => b.scores[lastIdx].total - a.scores[lastIdx].total);
            const progressOver30 = allStudents
                .filter(s => s.scores[lastIdx]?.total > 0 && s.scores[prevIdx]?.total > 0)
                .map(s => ({ ...s, progress: s.scores[lastIdx].total - s.scores[prevIdx].total }))
                .filter(s => s.progress > 30)
                .sort((a, b) => b.progress - a.progress);

            return (
                <div className="space-y-6 animate-fade-in no-print">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="bg-white p-4 rounded-xl card-shadow"><h3 className="font-bold text-gray-800 mb-4 flex items-center"><Icons.TrendingUp className="mr-2 text-blue-600"/> 班级总平均分走势</h3><div className="h-64"><ResponsiveContainer width="100%" height="100%"><LineChart data={stats}><CartesianGrid strokeDasharray="3 3"/><XAxis dataKey="name" fontSize={12}/><YAxis domain={['auto', 'auto']}/><Tooltip/><Legend/><Line type="monotone" dataKey="avg" name="总平均分" stroke="#2563eb" strokeWidth={3} dot={{r:4}}/></LineChart></ResponsiveContainer></div></div>
                        <div className="bg-white p-4 rounded-xl card-shadow"><h3 className="font-bold text-gray-800 mb-4 flex items-center"><Icons.Trophy className="mr-2 text-purple-600"/> 上线人数走势</h3><div className="h-64"><ResponsiveContainer width="100%" height="100%"><LineChart data={stats}><CartesianGrid strokeDasharray="3 3"/><XAxis dataKey="name" fontSize={12}/><YAxis allowDecimals={false}/><Tooltip/><Legend/><Line type="monotone" dataKey="specialCount" name="特控线人数" stroke="#7e22ce" strokeWidth={3}/><Line type="monotone" dataKey="bachelorCount" name="本科线人数" stroke="#2563eb" strokeWidth={3}/></LineChart></ResponsiveContainer></div></div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="bg-white p-4 rounded-xl card-shadow"><h3 className="font-bold text-gray-800 mb-4 flex items-center"><Icons.Activity className="mr-2 text-green-600"/> 各科平均分走势</h3><div className="h-72"><ResponsiveContainer width="100%" height="100%"><LineChart data={stats}><CartesianGrid strokeDasharray="3 3"/><XAxis dataKey="name" fontSize={12}/><YAxis domain={[0, 150]}/><Tooltip/><Legend wrapperStyle={{fontSize:'10px'}}/>{SUBJECTS.map((sub, i) => <Line key={sub} type="monotone" dataKey={sub} stroke={COLORS[i]} strokeWidth={2} dot={false}/>)}</LineChart></ResponsiveContainer></div></div>
                        <div className="bg-white p-6 rounded-xl card-shadow flex flex-col"><div className="flex justify-between items-center mb-4 border-b pb-2"><h3 className="font-bold text-lg text-gray-800">🏆 最新光荣榜</h3><span className="text-xs text-gray-500 bg-gray-100 px-2 py-1 rounded">特控: {cutoffs[lastIdx]?.special} | 本科: {cutoffs[lastIdx]?.bachelor}</span></div><div className="flex-1 overflow-y-auto"><div className="mb-4"><h4 className="font-bold text-purple-700 mb-2 flex items-center"><span className="w-2 h-2 rounded-full bg-purple-700 mr-2"></span>特控线 ({latestStat.specialList?.length || 0}人)</h4><div className="flex flex-wrap gap-2">{latestStat.specialList && latestStat.specialList.map((s, i) => <button key={i} onClick={() => onStudentClick(s)} className="px-3 py-2 bg-purple-50 text-purple-700 text-base font-bold rounded hover:bg-purple-100 transition">{s.name} <span>{s.scores[lastIdx]?.total}</span></button>)}</div></div><div><h4 className="font-bold text-blue-600 mb-2 flex items-center"><span className="w-2 h-2 rounded-full bg-blue-600 mr-2"></span>本科线 ({bachelorList.length}人)</h4><div className="flex flex-wrap gap-2">{bachelorList.map((s, i) => <button key={i} onClick={() => onStudentClick(s)} className="px-3 py-2 bg-blue-50 text-blue-600 text-base font-bold rounded hover:bg-blue-100 transition">{s.name} <span>{s.scores[lastIdx]?.total}</span></button>)}</div></div><div className="mt-4"><h4 className="font-bold text-green-600 mb-2 flex items-center"><span className="w-2 h-2 rounded-full bg-green-600 mr-2"></span>分数进步超过30分 ({progressOver30.length}人)</h4><div className="flex flex-wrap gap-2">{progressOver30.map((s, i) => <button key={i} onClick={() => onStudentClick(s)} className="px-3 py-2 bg-green-50 text-green-700 text-base font-bold rounded hover:bg-green-100 transition">{s.name}（{s.progress}分）</button>)}</div></div></div></div>
                    </div>
                </div>
            );
        };

        // --- Leaderboard ---
        const Leaderboard = ({ allStudents, cutoffs, onStudentClick }) => {
            const [selectedExamId, setSelectedExamId] = useState(() => getLastExamIndex());
            const [searchTerm, setSearchTerm] = useState("");
            useEffect(() => { setSelectedExamId(getLastExamIndex()); }, [cutoffs.length]);
            const sortedStudents = useMemo(() => {
                let list = allStudents.filter(s => s.scores[selectedExamId]?.total > 0);
                if (searchTerm) list = list.filter(s => s.name.includes(searchTerm) || s.id.includes(searchTerm));
                return list.sort((a, b) => b.scores[selectedExamId].total - a.scores[selectedExamId].total);
            }, [allStudents, selectedExamId, searchTerm]);
            const currentCutoff = cutoffs[selectedExamId];

            return (
                <div className="bg-white rounded-xl card-shadow overflow-hidden no-print">
                    <div className="p-6 border-b flex flex-col md:flex-row justify-between items-center gap-4 bg-gray-50">
                        <div className="flex items-center gap-4">
                            <h2 className="text-xl font-bold text-gray-800 flex items-center"><Icons.FileText className="mr-2"/> 成绩总表</h2>
                            <div className="relative">
                                <Icons.Search className="absolute left-3 top-2.5 text-gray-400 w-4 h-4"/>
                                <input type="text" placeholder="搜索姓名..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} className="pl-9 pr-4 py-2 border rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 w-48"/>
                            </div>

                                    <p className="text-sm leading-relaxed">{analysis.trend} {analysis.trendRaw}</p>
                                </div>
                                {analysis.outlierNotes && analysis.outlierNotes.length > 0 && (
                                    <div className="p-4 rounded-xl bg-red-50/80 border border-red-100">
                                        <p className="text-xs font-bold text-red-700 mb-2">【离群提醒】</p>
                                        <ul className="list-disc list-inside space-y-1 text-sm leading-relaxed">{analysis.outlierNotes.map((n, i) => <li key={i}>{n}</li>)}</ul>
                                    </div>
                                )}
                                {analysis.anomalyNotes && analysis.anomalyNotes.length > 0 && (
                                    <div className="p-4 rounded-xl bg-orange-50/80 border border-orange-100">
                                        <p className="text-xs font-bold text-orange-700 mb-2">【异常检测（Median + MAD）】</p>
                                        <ul className="list-disc list-inside space-y-1 text-sm leading-relaxed">{analysis.anomalyNotes.slice(0, 6).map((n, i) => <li key={i}>{n}</li>)}</ul>
                                    </div>
                                )}
                                {analysis.subjectRows && analysis.subjectRows.length > 0 && (
                                    <div className="p-4 rounded-xl bg-slate-50/80 border border-slate-200 overflow-x-auto">
                                        <p className="text-xs font-bold text-slate-700 mb-3">【单科诊断：双维度对照】</p>
                                        <table className="w-full text-sm text-center border-collapse">
                                            <thead>
                                                <tr className="bg-slate-100 text-slate-700">
                                                    <th className="border border-slate-200 px-2 py-2">科目</th>
                                                    <th className="border border-slate-200 px-2 py-2">本次分</th>
                                                    <th className="border border-slate-200 px-2 py-2">个人历史位置</th>
                                                    <th className="border border-slate-200 px-2 py-2">相对班级</th>
                                                    <th className="border border-slate-200 px-2 py-2">综合判断</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {analysis.subjectRows.map((r, i) => (
                                                    <tr key={i}>
                                                        <td className="border border-slate-200 px-2 py-2 font-bold">{r.subject}</td>
                                                        <td className="border border-slate-200 px-2 py-2">{r.latest}</td>
                                                        <td className="border border-slate-200 px-2 py-2">{r.historyText}</td>
                                                        <td className="border border-slate-200 px-2 py-2">{r.classText}</td>
                                                        <td className="border border-slate-200 px-2 py-2">{r.judgement}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}
                                {analysis.subjectAdviceList && analysis.subjectAdviceList.length > 0 && (
                                    <div className="p-4 rounded-xl bg-slate-50/80 border border-slate-200">
                                        <p className="text-xs font-bold text-slate-700 mb-3">【科目建议（决策树）】</p>
                                        <div className="space-y-3">
                                            {analysis.subjectAdviceList.map((item, i) => (
                                                <div key={i} className="pl-3 border-l-2 border-slate-300">
                                                    <p className="text-sm font-bold text-slate-800">{item.subject} <span className="text-xs font-medium px-1.5 py-0.5 rounded bg-slate-200 text-slate-700">分支 {item.branch}</span></p>
                                                    <p className="text-sm leading-relaxed mt-1 text-slate-600">{item.dataLine} {item.suggestion}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                <div className="p-4 rounded-xl bg-green-50/80 border border-green-100">
                                    <p className="text-xs font-bold text-green-800 mb-2">【行动指南（优先级+时间分配）】</p>
                                    <ul className="list-decimal list-inside space-y-2 text-sm leading-relaxed">{analysis.actionPlan.map((a, i) => <li key={i}>{a.title}：每日自习投入建议 {a.ratio}%，{a.detail}</li>)}</ul>
                                </div>
                            </div>
                        </section>
                    </div>
                </div>
            );
        };

        // --- Main App ---
        const DataUploadModal = ({ isOpen, onClose, onDataUpdate, initialCutoffs }) => {
            if (!isOpen) return null;
            const [cutoffs, setCutoffs] = useState(initialCutoffs);
            const [files, setFiles] = useState(() => Array((initialCutoffs && initialCutoffs.length) ? initialCutoffs.length : 6).fill(null));
            const [expandedExamId, setExpandedExamId] = useState(null);
            const handleCutoffChange = (index, field, value) => { const newCutoffs = [...cutoffs]; newCutoffs[index] = { ...newCutoffs[index], [field]: Number(value) }; setCutoffs(newCutoffs); };
            const handleSubjectLineChange = (examIndex, subject, value) => { const newCutoffs = [...cutoffs]; if (!newCutoffs[examIndex].subjects) newCutoffs[examIndex].subjects = { ...(RUNTIME_EXAMS[examIndex]?.defaultSubs || {}) }; newCutoffs[examIndex].subjects[subject] = Number(value); setCutoffs(newCutoffs); };
            const handleFileChange = (index, e) => { const newFiles = [...files]; newFiles[index] = e.target.files[0]; setFiles(newFiles); };
            const parseAndMerge = (studentMap, rows, index) => { 
                rows.forEach(row => { 
                    if (!row[0] || row[0].toString().includes('姓名') || row[0].toString().includes('平均分')) return; 
                    const id = row[1] ? row[1].toString().trim() : ""; 
                    if(!id) return; 
                    if (!studentMap[id]) studentMap[id] = { name: row[0], id: id, scores: Array(cutoffs.length).fill(null).map((_, i) => ({ examId: i, total: 0, rank: 0, gradeRank: 0, subjects: {} })) }; 
                    const rankStr = row[3] ? row[3].toString() : "0/0";
                    const rankParts = rankStr.split('/');
                    const classRank = parseInt(rankParts[0]) || 0;
                    const gradeRank = parseInt(rankParts[1]) || 0;
                    studentMap[id].scores[index] = { examId: index, total: parseFloat(row[2]) || 0, rank: classRank, gradeRank: gradeRank, subjects: { '语文': parseFloat(row[4])||0, '数学': parseFloat(row[6])||0, '英语': parseFloat(row[8])||0, '物理': parseFloat(row[10])||0, '化学': parseFloat(row[12])||0, '生物': parseFloat(row[14])||0, '政治': parseFloat(row[16])||0, '历史': parseFloat(row[18])||0, '地理': parseFloat(row[20])||0 } }; 
                }); 
            };
            const processFiles = () => { const studentMap = {}; let processedCount = 0; let activeFiles = files.map((f, i) => ({file: f, index: i})).filter(item => item.file); if (activeFiles.length === 0) { onDataUpdate(null, cutoffs); onClose(); return; } activeFiles.forEach(({file, index}) => { if (file.name.endsWith('.xls') || file.name.endsWith('.xlsx')) { const reader = new FileReader(); reader.onload = (e) => { const workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'}); const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1}); parseAndMerge(studentMap, rows, index); processedCount++; if (processedCount === activeFiles.length) { onDataUpdate(Object.values(studentMap), cutoffs); onClose(); } }; reader.readAsArrayBuffer(file); } else { Papa.parse(file, { header: false, complete: (res) => { parseAndMerge(studentMap, res.data, index); processedCount++; if (processedCount === activeFiles.length) { onDataUpdate(Object.values(studentMap), cutoffs); onClose(); } } }); } }); };
            return (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 overflow-y-auto">
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-5xl p-6 my-10"><div className="flex justify-between items-center mb-6 border-b pb-4"><h2 className="text-2xl font-bold text-gray-800">📊 数据导入与参数设置</h2><button onClick={onClose} className="text-gray-500 hover:text-gray-700">✕</button></div><div className="grid grid-cols-12 gap-4 text-sm font-bold bg-gray-100 p-3 rounded mb-2"><div className="col-span-2">考试名称</div><div className="col-span-2">特控线 (一本)</div><div className="col-span-2">本科线 (二本)</div><div className="col-span-4">对应数据文件 (CSV/XLS/XLSX)</div><div className="col-span-2 text-center">高级设置</div></div><div className="space-y-3 max-h-[60vh] overflow-y-auto pr-2">{RUNTIME_EXAMS.map((exam, idx) => (<div key={exam.id != null ? exam.id : idx} className="border-b pb-2"><div className="grid grid-cols-12 gap-4 items-center"><div className="col-span-2 text-gray-700 font-medium truncate" title={exam.name}>{exam.name}</div><div className="col-span-2"><input type="number" value={cutoffs[idx].special} onChange={(e) => handleCutoffChange(idx, 'special', e.target.value)} className="w-full border rounded px-2 py-1 focus:ring-2 focus:ring-blue-500"/></div><div className="col-span-2"><input type="number" value={cutoffs[idx].bachelor} onChange={(e) => handleCutoffChange(idx, 'bachelor', e.target.value)} className="w-full border rounded px-2 py-1 focus:ring-2 focus:ring-blue-500"/></div><div className="col-span-4"><input type="file" accept=".csv,.xls,.xlsx" onChange={(e) => handleFileChange(idx, e)} className="w-full text-xs text-gray-500 file:mr-2 file:py-1 file:px-2 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"/></div><div className="col-span-2 text-center"><button onClick={() => setExpandedExamId(expandedExamId === idx ? null : idx)} className={`text-xs px-3 py-1 rounded border transition ${expandedExamId === idx ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-600 border-gray-300 hover:bg-gray-50'}`}><Icons.Settings size={12} className="inline mr-1"/>{expandedExamId === idx ? '收起' : '各科线'}</button></div></div>{expandedExamId === idx && (<div className="mt-3 bg-blue-50 p-3 rounded-lg grid grid-cols-3 md:grid-cols-5 gap-3 animate-fade-in"><div className="col-span-full text-xs text-blue-600 font-bold mb-1">设置 {exam.name} 的各科有效分：</div>{SUBJECTS.map(sub => (<div key={sub} className="flex items-center"><label className="text-xs text-gray-600 mr-2 w-8">{sub}</label><input type="number" value={(cutoffs[idx].subjects || RUNTIME_EXAMS[idx]?.defaultSubs || {})[sub]} onChange={(e) => handleSubjectLineChange(idx, sub, e.target.value)} className="w-16 border rounded px-1 text-sm focus:ring-1 focus:ring-blue-500"/></div>))}</div>)}</div>))}</div><div className="mt-8 flex justify-end gap-4 border-t pt-4"><button onClick={onClose} className="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded">取消</button><button onClick={processFiles} className="px-6 py-2 bg-blue-600 text-white font-bold rounded hover:bg-blue-700 shadow-lg flex items-center"><Icons.Check size={18} className="mr-2"/> 确认处理</button></div></div></div>
            );
        };

        const defaultCutoffs = () => RUNTIME_EXAMS.map(e => ({ special: e.defaultSpecial, bachelor: e.defaultBachelor, subjects: { ...(e.defaultSubs || {}) } }));

        const App = () => {
            const [students, setStudents] = useState(DEMO_STUDENTS);
            const [cutoffs, setCutoffs] = useState(defaultCutoffs());
            const [showModal, setShowModal] = useState(false);
            const [view, setView] = useState('dashboard');
            const [selectedStudent, setSelectedStudent] = useState(null);
            const [dataSource, setDataSource] = useState('demo'); // 'demo' | 'api'
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                fetch('/api/data').then(r => r.ok ? r.json() : Promise.reject()).then(data => {
                    if (data.students && data.students.length >= 0 && data.cutoffs && data.cutoffs.length > 0) {
                        if (data.exams && data.exams.length) {
                            RUNTIME_EXAMS = data.exams.map((e, i) => ({
                                id: e.id != null ? e.id : i,
                                name: e.name || `第${i + 1}次考试`,
                                defaultSpecial: (e.cutoffs && e.cutoffs.special != null) ? e.cutoffs.special : (EXAM_CONFIG[i]?.defaultSpecial ?? 0),
                                defaultBachelor: (e.cutoffs && e.cutoffs.bachelor != null) ? e.cutoffs.bachelor : (EXAM_CONFIG[i]?.defaultBachelor ?? 0),
                                defaultSubs: (e.cutoffs && e.cutoffs.subjects) ? e.cutoffs.subjects : (EXAM_CONFIG[i]?.defaultSubs || {})
                            }));
                        }
                        setStudents(data.students);
                        setCutoffs(data.cutoffs);
                        setDataSource('api');
                    }
                }).catch(() => {}).finally(() => setLoading(false));
            }, []);

            const handleDataUpdate = (newStudents, newCutoffs) => { if(newCutoffs) setCutoffs(newCutoffs); if(newStudents) setStudents(newStudents); };
            const handlePrint = () => { if (dataSource === 'demo' && !confirm("当前是演示数据，是否继续打印？")) return; window.print(); };

            return (
                <div className="min-h-screen pb-10">
                    <DataUploadModal isOpen={showModal} onClose={() => setShowModal(false)} initialCutoffs={cutoffs} onDataUpdate={handleDataUpdate}/>
                    <nav className="bg-white border-b sticky top-0 z-40 glass-effect no-print px-4 h-16 flex justify-between items-center shadow-sm">
                        <div className="flex items-center text-blue-700 font-bold text-xl tracking-tight">📊 高33班分析系统</div>
                        <div className="flex gap-3">
                            <button onClick={() => setView('dashboard')} className={`px-4 py-2 rounded font-medium text-sm transition ${view==='dashboard'?'bg-blue-50 text-blue-700':'text-gray-600 hover:bg-gray-50'}`}>数据大屏</button>
                            <button onClick={() => setView('leaderboard')} className={`px-4 py-2 rounded font-medium text-sm transition ${view==='leaderboard'?'bg-blue-50 text-blue-700':'text-gray-600 hover:bg-gray-50'}`}>成绩总表</button>
                            <button onClick={() => setView('subject')} className={`px-4 py-2 rounded font-medium text-sm transition ${view==='subject'?'bg-blue-50 text-blue-700':'text-gray-600 hover:bg-gray-50'}`}>各科分析</button>
                            <div className="w-px h-6 bg-gray-300 mx-1 self-center"></div>
                            <button onClick={() => setShowModal(true)} className="flex items-center text-gray-600 hover:text-blue-600 px-3 py-2 rounded text-sm font-medium"><Icons.Upload size={16} className="mr-2"/> 导入数据</button>
                            <a href="admin.html" target="_blank" className="flex items-center text-gray-500 hover:text-gray-700 px-3 py-2 rounded text-sm font-medium" title="管理后台">⚙️</a>
                            <button onClick={handlePrint} className="flex items-center bg-blue-600 text-white px-4 py-2 rounded text-sm font-bold hover:bg-blue-700 shadow transition"><Icons.Printer size={16} className="mr-2"/> 批量打印</button>
                        </div>
                    </nav>
                    {loading && <div className="fixed inset-0 bg-white/80 flex items-center justify-center z-50"><div className="text-gray-500">加载中...</div></div>}
                    <main className="max-w-7xl mx-auto px-4 py-8 no-print">
                        {view === 'dashboard' && <Dashboard allStudents={students} cutoffs={cutoffs} onStudentClick={(s)=>{setSelectedStudent(s); setView('student');}}/>}
                        {view === 'leaderboard' && <Leaderboard allStudents={students} cutoffs={cutoffs} onStudentClick={(s)=>{setSelectedStudent(s); setView('student');}}/>}
                        {view === 'subject' && <SubjectAnalysis allStudents={students} cutoffs={cutoffs} />}
                        {view === 'student' && selectedStudent && (
                            <div className="fixed inset-0 bg-slate-50 z-50 overflow-y-auto">
                                <StudentReportScreen student={selectedStudent} cutoffs={cutoffs} allStudents={students} onBack={() => setView('leaderboard')} />
                            </div>
                        )}
                    </main>
                    <div className="print-only">
                        <div className="print-container">
                            {students.map(s => (
                                <div key={s.id} className="print-group">
                                    <ReportPage student={s} cutoffs={cutoffs} allStudents={students}/>
                                    <ReportPageTwo student={s} />
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
